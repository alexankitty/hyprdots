# Sourcing maugen colors
source = $HOME/.config/hypr/hyprlock/matugen/matugen-hyprlock.conf
source = $HOME/.config/hypr/hyprlock/primary.conf

$text_color = $on_surface
$entry_background_color = $surface_alpha
$entry_border_color = $primary
$entry_color = $on_surface
$font_family = Roboto
$font_family_clock = Roboto
$font_symbols = Roboto
$primary_monitor = $(hyprctl monitors -j | jq -r '.[] | select(.x == 0 and .y == 0) | .name')

background {
    color = $surface
    path = $image
    blur_size = 5
    blur_passes = 4
}

image { #Pfp
    monitor = $monitor
    path = ~/.face
    border_size = 0
    border_color = $entry_border_color
    size = 160
    rounding = -1
    position = 0, 120
    halign = center
    valign = center
}

label { # User
    monitor = $monitor
    text = $DESC
    color = $text_color
    font_size = 20
    font_family = $font_symbols
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor = $monitor
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = false

    position = 0, -80
    halign = center
    valign = center
}

label { # Caps Lock Warning
    monitor = $monitor
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, -140
    halign = center
    valign = center
}


label { # Clock
    monitor = $monitor
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock

    position = -40, 40
    halign = right
    valign = bottom
}
label { # Date
    monitor = $monitor
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family

    position = -40, 20
    halign = right
    valign = bottom
}



label { # Status
    monitor = $monitor
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 14
    font_family = $font_family

    position = 40, -30
    halign = left
    valign = top
}
